name: nchat_fix
description: Firebase-enabled chat app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <3.1.0"  # ✅ Dart 3.0.5 compatible

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # ✅ Firebase Packages (Safe for Dart 3.0.5)
  firebase_core: ^2.17.0
  firebase_auth: ^4.7.0
  cloud_firestore: ^4.8.4
  firebase_messaging: ^14.6.5
  firebase_storage: ^11.2.6
  uuid: 4.2.2

  # ✅ Other Stable Plugins
  google_maps_flutter: ^2.3.0
  geolocator: ^11.1.0
  image_picker: ^1.0.4
  emoji_picker_flutter: 1.6.4
  http: ^1.1.0
  google_fonts: ^6.2.0
  flutter_local_notifications: ^17.2.4
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1   # ✅ Icon setup dependency

flutter:
  uses-material-design: true

  assets:
    - assets/icons/   # ✅ Correct & enough

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/app_icon.png"